<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Students - Smart Education System</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo"><i class="fas fa-user-shield"></i> AdminPanel</div>
            <ul class="sidebar-menu">
                <li><a href="/admin-dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="/admin-students.html" class="active"><i class="fas fa-user-graduate"></i> Manage Students</a></li>
                <li><a href="/admin-teachers.html"><i class="fas fa-chalkboard-teacher"></i> Manage Teachers</a></li>
                <li><a href="/admin-courses.html"><i class="fas fa-book"></i> Courses Overview</a></li>
                <li><a href="/admin-settings.html"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>Manage Students (Admin)</h2>
                <input type="text" class="form-control" placeholder="Search by name or email..." style="width: 300px;">
            </div>

            <div class="card glass">
                <table style="width: 100%; text-align: left; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border-color);">
                            <th style="padding: 1rem;">ID</th>
                            <th style="padding: 1rem;">Name</th>
                            <th style="padding: 1rem;">Email</th>
                            <th style="padding: 1rem;">Status</th>
                            <th style="padding: 1rem;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="students-tbody">
                        <tr><td colspan="5" style="padding: 1rem; text-align: center;">Loading students...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            SmartSys.checkAuth('admin');
            
            try {
                const students = await SmartSys.apiCall('/users/students');
                const tbody = document.getElementById('students-tbody');
                
                if (students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="padding: 1rem; text-align: center;">No students found.</td></tr>';
                    return;
                }

                tbody.innerHTML = students.map(student => `
                    <tr style="border-bottom: 1px solid var(--border-color);">
                        <td style="padding: 1rem;">${student.id}</td>
                        <td style="padding: 1rem;">${student.name}</td>
                        <td style="padding: 1rem;">${student.email}</td>
                        <td style="padding: 1rem;"><span style="background: rgba(34, 197, 94, 0.1); color: var(--accent); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem;">Active</span></td>
                        <td style="padding: 1rem;">
                            <button class="btn btn-outline" style="padding: 0.3rem 0.8rem; font-size: 0.9rem;">Edit</button>
                            <button class="btn btn-outline" style="padding: 0.3rem 0.8rem; font-size: 0.9rem; color: #ef4444; border-color: #ef4444;">Suspend</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
