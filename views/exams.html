<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams & Tests - Smart Education System</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo"><i class="fas fa-graduation-cap"></i> SmartEdu</div>
            <ul class="sidebar-menu">
                <li><a href="/student-dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="/online-classes.html"><i class="fas fa-video"></i> Online Classes</a></li>
                <li><a href="/exams.html" class="active"><i class="fas fa-clipboard-check"></i> Exams & Tests</a></li>
                <li><a href="/performance.html"><i class="fas fa-chart-pie"></i> Performance</a></li>
                <li><a href="/study-materials.html"><i class="fas fa-book"></i> Study Materials</a></li>
                <li><a href="/ai-assistant.html"><i class="fas fa-robot"></i> AI Assistant</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <h2 style="margin-bottom: 2rem;">Exams & Tests</h2>
            
            <div class="card glass">
                <h3 style="margin-bottom: 1.5rem;">Available Exams</h3>
                <ul id="exams-list" style="list-style: none;">
                    <li style="padding: 1rem; text-align: center;">Loading exams...</li>
                </ul>
            </div>

            <!-- Exam Modal (Hidden by default) -->
            <div id="examModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;">
                <div class="card glass" style="width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h3 id="examModalTitle">Exam Title</h3>
                        <div style="font-weight: bold; color: #ef4444;"><i class="fas fa-clock"></i> <span id="timer">59:59</span></div>
                    </div>
                    
                    <div style="margin-bottom: 1.5rem;">
                        <p style="font-weight: 500; margin-bottom: 1rem;">1. Please read the question carefully before answering.</p>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label><input type="radio" name="q1" value="A"> Option A</label>
                            <label><input type="radio" name="q1" value="B"> Option B</label>
                            <label><input type="radio" name="q1" value="C"> Option C</label>
                            <label><input type="radio" name="q1" value="D"> Option D</label>
                        </div>
                    </div>

                    <button class="btn btn-primary" onclick="submitExam()" style="width: 100%;">Submit Exam</button>
                </div>
            </div>

        </main>
    </div>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            SmartSys.checkAuth('student');
            
            try {
                const exams = await SmartSys.apiCall('/exams');
                const list = document.getElementById('exams-list');
                
                if (exams.length === 0) {
                    list.innerHTML = '<li style="padding: 1rem; text-align: center;">No exams currently available.</li>';
                    return;
                }

                list.innerHTML = exams.map(e => `
                    <li style="padding: 1rem; border: 1px solid var(--border-color); border-radius: var(--radius); margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h4>${e.title}</h4>
                            <p style="color: var(--text-light); font-size: 0.9rem;">Course: ${e.course_id || 'General'} • Total Marks: ${e.total_marks}</p>
                        </div>
                        <button class="btn btn-primary" onclick="startExam('${e.title}')">Start Exam</button>
                    </li>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        });

        function startExam(title) {
            document.getElementById('examModalTitle').innerText = title;
            document.getElementById('examModal').style.display = 'flex';
        }

        function submitExam() {
            document.getElementById('examModal').style.display = 'none';
            SmartSys.showToast('Exam submitted successfully! Auto-evaluating...', 'success');
        }
    </script>
</body>
</html>
