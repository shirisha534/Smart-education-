<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Classes - Smart Education System</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo"><i class="fas fa-graduation-cap"></i> SmartEdu</div>
            <ul class="sidebar-menu">
                <li><a href="/teacher-dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="/manage-students.html"><i class="fas fa-users"></i> Manage Students</a></li>
                <li><a href="/upload-materials.html"><i class="fas fa-upload"></i> Upload Materials</a></li>
                <li><a href="/create-exams.html"><i class="fas fa-file-alt"></i> Create Exams</a></li>
                <li><a href="/teacher-classes.html" class="active"><i class="fas fa-video"></i> Live Classes</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>Live Classes Schedule</h2>
            </div>

            <div class="card glass" style="margin-bottom: 2rem;">
                <h3 style="margin-bottom: 1rem;">Schedule New Class</h3>
                <form id="scheduleForm" style="display: flex; gap: 1rem; align-items: flex-end;">
                    <div class="form-group" style="margin: 0; flex: 1;">
                        <label>Class Title</label>
                        <input type="text" id="classTitle" class="form-control" required placeholder="e.g. Thermodynamics">
                    </div>
                    <div class="form-group" style="margin: 0; flex: 1;">
                        <label>Course</label>
                        <select id="classCourse" class="form-control" required>
                            <option value="physics">Physics</option>
                            <option value="math">Mathematics</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin: 0; flex: 1;">
                        <label>Time</label>
                        <input type="datetime-local" id="classTime" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Schedule</button>
                </form>
            </div>

            <div class="card glass">
                <ul id="classes-list" style="list-style: none;">
                    <li style="padding: 1.5rem; text-align: center;">Loading classes...</li>
                </ul>
            </div>
        </main>
    </div>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            SmartSys.checkAuth('teacher');
            await loadClasses();
        });

        async function loadClasses() {
            try {
                const classes = await SmartSys.apiCall('/classes');
                const list = document.getElementById('classes-list');
                if(classes.length === 0) {
                    list.innerHTML = '<li style="padding: 1.5rem; text-align: center;">No scheduled classes.</li>';
                    return;
                }
                list.innerHTML = classes.map(c => `
                    <li style="padding: 1.5rem; border: 1px solid var(--border-color); border-radius: var(--radius); margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; background: rgba(37, 99, 235, 0.05);">
                        <div>
                            <h4 style="margin-bottom: 0.5rem;">${c.title}</h4>
                            <p style="color: var(--text-light); font-size: 0.9rem;"><i class="fas fa-clock"></i> ${new Date(c.scheduled_time).toLocaleString()}</p>
                        </div>
                        <button class="btn btn-primary" style="background: #ef4444;"><i class="fas fa-video"></i> Start Class</button>
                    </li>
                `).join('');
            } catch (err) {}
        }

        document.getElementById('scheduleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('classTitle').value;
            const course_id = document.getElementById('classCourse').value;
            const scheduled_time = document.getElementById('classTime').value;
            
            try {
                await SmartSys.apiCall('/classes', {
                    method: 'POST',
                    body: JSON.stringify({ title, course_id, scheduled_time })
                });
                SmartSys.showToast('Class scheduled successfully!', 'success');
                e.target.reset();
                loadClasses();
            } catch (err) {}
        });
    </script>
</body>
</html>
