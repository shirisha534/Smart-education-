<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Smart Education System</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { display: flex; align-items: center; gap: 1.5rem; }
        .stat-icon { font-size: 2.5rem; color: var(--primary); background: rgba(37, 99, 235, 0.1); padding: 1rem; border-radius: var(--radius); }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-user-shield"></i> AdminPanel
            </div>
            <ul class="sidebar-menu">
                <li><a href="/admin-dashboard.html" class="active"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="/admin-students.html"><i class="fas fa-user-graduate"></i> Manage Students</a></li>
                <li><a href="/admin-teachers.html"><i class="fas fa-chalkboard-teacher"></i> Manage Teachers</a></li>
                <li><a href="/admin-courses.html"><i class="fas fa-book"></i> Courses Overview</a></li>
                <li><a href="/admin-settings.html"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
            <div style="margin-top: auto;">
                <button id="theme-toggle" class="btn btn-outline" style="width: 100%; margin-bottom: 1rem;"><i class="fas fa-moon"></i> Theme</button>
                <button id="logout-btn" class="btn btn-primary" style="width: 100%;"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h2>Admin Dashboard</h2>
                <p style="color: var(--text-light);">System overview and analytics.</p>
            </header>

            <div class="stats-grid">
                <div class="card glass stat-card">
                    <div class="stat-icon"><i class="fas fa-user-graduate"></i></div>
                    <div>
                        <h3 style="font-size: 1.5rem;">5,042</h3>
                        <p style="color: var(--text-light);">Total Students</p>
                    </div>
                </div>
                <div class="card glass stat-card">
                    <div class="stat-icon" style="color: var(--accent); background: rgba(34, 197, 94, 0.1);"><i class="fas fa-chalkboard-teacher"></i></div>
                    <div>
                        <h3 style="font-size: 1.5rem;">124</h3>
                        <p style="color: var(--text-light);">Total Teachers</p>
                    </div>
                </div>
                <div class="card glass stat-card">
                    <div class="stat-icon" style="color: #f59e0b; background: rgba(245, 158, 11, 0.1);"><i class="fas fa-server"></i></div>
                    <div>
                        <h3 style="font-size: 1.5rem;">99.9%</h3>
                        <p style="color: var(--text-light);">System Uptime</p>
                    </div>
                </div>
            </div>

            <div class="card glass">
                <h3 style="margin-bottom: 1rem;">Recent Registrations</h3>
                <p style="color: var(--text-light);">No new registrations pending approval.</p>
            </div>
        </main>
    </div>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            SmartSys.checkAuth('admin');
        });
    </script>
</body>
</html>
